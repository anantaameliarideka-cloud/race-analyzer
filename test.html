<!DOCTYPE html>
<html>
<head>
    <title>Test Navigation</title>
    <style>
        body { background: #1a1a3e; color: #00d4ff; font-family: Arial; padding: 20px; }
        button { padding: 10px 20px; margin: 10px; background: #00d4ff; color: black; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background: #0099cc; }
        div { margin: 20px 0; padding: 20px; background: rgba(0,212,255,0.1); border: 2px solid #00d4ff; display: none; }
        div.active { display: block; }
        h2 { color: #00d4ff; }
    </style>
</head>
<body>
    <h1>🏍️ Test Navigation</h1>
    
    <button onclick="switchPage('home')">Go Home</button>
    <button onclick="switchPage('circuit')">Go Circuit</button>
    <button onclick="switchPage('profile')">Go Profile</button>

    <div id="homePage" class="active">
        <h2>HOME PAGE</h2>
        <p>Ini halaman home</p>
    </div>

    <div id="circuitPage">
        <h2>CIRCUIT PAGE</h2>
        <p>Ini halaman circuit</p>
    </div>

    <div id="profilePage">
        <h2>PROFILE PAGE</h2>
        <p>Ini halaman profile</p>
    </div>

    <script>
        function switchPage(pageName) {
            console.log('Switching to:', pageName);
            
            // Hide all
            document.querySelectorAll('div[id$="Page"]').forEach(page => {
                page.classList.remove('active');
            });
            
            // Show one
            const page = document.getElementById(pageName + 'Page');
            if (page) {
                page.classList.add('active');
                console.log('✅ Page switched');
            } else {
                console.error('❌ Page not found:', pageName + 'Page');
            }
        }
    </script>
</body>
</html>
